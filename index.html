<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#07101e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Pocket Tennis League</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Rotate-to-portrait message for small landscape screens -->
  <div id="rotate-msg">
    <span>📱</span>
    Please rotate your device to portrait mode
  </div>

  <!-- Game canvas container -->
  <div id="game-container"></div>

  <!-- Keyboard hint (visible on desktop/non-touch) -->
  <div id="keyboard-hint">
    ⬆⬇⬅➡ / WASD — Move &nbsp;|&nbsp; Space / Enter — Hit / Serve &nbsp;|&nbsp;
    Z — Lob &nbsp;|&nbsp; X — Topspin &nbsp;|&nbsp; C — Smash &nbsp;|&nbsp; Esc — Pause
  </div>

  <!-- Phaser 3 game engine -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>

  <!-- ── Core utilities (load order matters: no bundler) ──────── -->
  <script src="js/constants.js"></script>
  <script src="js/audio.js"></script>

  <!-- ── Asset generation ───────────────────────────────────────── -->
  <script src="js/assetgen.js"></script>

  <!-- ── Game objects ───────────────────────────────────────────── -->
  <script src="js/physics.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/joystick.js"></script>
  <script src="js/score.js"></script>
  <script src="js/league.js"></script>

  <!-- ── Scenes (load before main.js which registers them) ─────── -->
  <script src="js/scenes/boot.js"></script>
  <script src="js/scenes/menu.js"></script>
  <script src="js/scenes/difficulty.js"></script>
  <script src="js/scenes/match.js"></script>
  <script src="js/scenes/result.js"></script>
  <script src="js/scenes/league_scene.js"></script>
  <script src="js/scenes/training.js"></script>

  <!-- ── Phaser game configuration & launch ─────────────────────── -->
  <script src="js/main.js"></script>

</body>
</html>
