// SCENE: TRAINING
// ═══════════════════════════════════════════════════════════
class TrainingScene extends Phaser.Scene {
  constructor() { super('TrainingScene'); }

  create() {
    const w = this.scale.width, h = this.scale.height;
    this.currentDrill = 'menu';
    this.drillScore = 0;
    this.totalDrills = 0;
    this.drillTimer = 0;
    this.drillActive = false;
    this.targets = [];
    this.hitsRemaining = 0;

    this.add.image(w/2, h/2, 'court_hard');
    this.add.image(w/2, COURT_TOP - 20, 'crowd').setAlpha(0.5);
    this.net = this.add.image(w/2, NET_Y + 4, 'net').setDepth(8);

    this.player = new Player(this, 1, COURT_MID_X, COURT_BOTTOM - 70, true);
    this.ball = new TennisBall(this);
    this.emitterGfx = this.add.graphics().setDepth(11);
    this.bounceParticles = [];

    this._buildTrainingMenu(w, h);

    this.input.on('pointerdown', (p) => {
      synth.resume();
      this.joy && this.joy.handlePointer(p, true);
      if (this.drillActive) this._handleDrillTap(p);
    });
    this.input.on('pointerup',   (p) => { this.joy && this.joy.handlePointer(p, false); });
    this.input.on('pointermove', (p) => { this.joy && this.joy.handleMove(p); });
  }

  _buildTrainingMenu(w, h) {
    if (this.menuGroup) this.menuGroup.clear(true, true);
    this.menuGroup = this.add.group();

    const overlay = this.add.graphics().setDepth(20);
    overlay.fillStyle(0x000000, 0.7);
    overlay.fillRect(0, 0, w, h);
    this.menuGroup.add(overlay);

    const title = this.add.text(w/2, 80, '🎯 TRAINING MODE', {
      fontSize: '22px', fontStyle: 'bold', color: '#ffffff',
      stroke: '#1a3aff', strokeThickness: 3
    }).setOrigin(0.5).setDepth(21);
    this.menuGroup.add(title);

    const drills = [
      { key: 'serve',    label: '🎾 SERVE PRACTICE',  desc: '10 serves, hit targets', color: '#22aa55' },
      { key: 'target',   label: '🎯 TARGET SHOTS',    desc: 'Hit moving targets',      color: '#1a6bff' },
      { key: 'reaction', label: '⚡ REACTION DRILLS', desc: 'React to fast balls',     color: '#cc8800' },
    ];

    drills.forEach((d, i) => {
      const by = 180 + i * 110;
      const col = Phaser.Display.Color.HexStringToColor(d.color).color;

      const bg = this.add.graphics().setDepth(21);
      bg.fillStyle(col, 0.85);
      bg.fillRoundedRect(w/2 - 140, by, 280, 80, 14);
      bg.lineStyle(2, 0xffffff, 0.2);
      bg.strokeRoundedRect(w/2 - 140, by, 280, 80, 14);
      this.menuGroup.add(bg);

      const lt = this.add.text(w/2, by + 24, d.label, {
        fontSize: '18px', fontStyle: 'bold', color: '#ffffff',
        stroke: '#00000044', strokeThickness: 2
      }).setOrigin(0.5).setDepth(22);
      this.menuGroup.add(lt);

      const dt2 = this.add.text(w/2, by + 52, d.desc, {
        fontSize: '12px', color: '#ffffffaa'
      }).setOrigin(0.5).setDepth(22);
      this.menuGroup.add(dt2);

      const z = this.add.zone(w/2, by + 40, 280, 80).setInteractive({ useHandCursor: true }).setDepth(23);
      z.on('pointerdown', () => {
        synth.menuTap();
        this._startDrill(d.key, w, h);
      });
      this.menuGroup.add(z);
    });

    // Back
    const backBg = this.add.graphics().setDepth(21);
    backBg.fillStyle(0x222244, 0.9);
    backBg.fillRoundedRect(w/2 - 70, h - 75, 140, 44, 10);
    this.menuGroup.add(backBg);
    const backT = this.add.text(w/2, h - 53, '← BACK', { fontSize: '15px', color: '#aabbff' }).setOrigin(0.5).setDepth(22);
    this.menuGroup.add(backT);
    const backZ = this.add.zone(w/2, h - 53, 140, 44).setInteractive({ useHandCursor: true }).setDepth(23);
    backZ.on('pointerdown', () => { synth.menuTap(); this.scene.start('MenuScene'); });
    this.menuGroup.add(backZ);
  }

  _startDrill(key, w, h) {
    this.menuGroup.clear(true, true);
    this.currentDrill = key;
    this.drillScore = 0;
    this.drillActive = true;
    this.drillTimer = 0;
    this.hitsRemaining = key === 'serve' ? 10 : key === 'target' ? 8 : 15;

    // Setup joystick
    if (!this.joy) {
      this.joy = new VirtualJoystick(this, 75, h - 120);
    }

    // Score HUD
    if (this.drillHUD) this.drillHUD.destroy();
    this.drillScoreText = this.add.text(w/2, 25, 'HITS: 0/' + this.hitsRemaining, {
      fontSize: '18px', fontStyle: 'bold', color: '#ffd700',
      stroke: '#000000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(20);

    this.drillTimerText = this.add.text(w - 20, 25, '0.0s', {
      fontSize: '14px', color: '#aabbcc'
    }).setOrigin(1, 0.5).setDepth(20);

    this.drillHintText = this.add.text(w/2, 80, 'TAP HIT BUTTON', {
      fontSize: '13px', color: '#ffffff88'
    }).setOrigin(0.5).setDepth(20);

    // Hit button
    const hitG = this.add.graphics().setDepth(30);
    hitG.fillStyle(0x1a6bff, 0.9);
    hitG.fillCircle(w - 70, h - 110, 45);
    const hitT = this.add.text(w - 70, h - 110, 'HIT', {
      fontSize: '13px', fontStyle: 'bold', color: '#ffffff'
    }).setOrigin(0.5).setDepth(31);
    const hitZ = this.add.zone(w - 70, h - 110, 90, 90).setInteractive().setDepth(32);
    hitZ.on('pointerdown', () => { this._performDrillHit(); });

    // Back
    const bkG = this.add.graphics().setDepth(30);
    bkG.fillStyle(0x222244, 0.7);
    bkG.fillRoundedRect(10, 10, 70, 34, 7);
    const bkT = this.add.text(45, 27, '← BACK', { fontSize: '11px', color: '#aabbff' }).setOrigin(0.5).setDepth(31);
    const bkZ = this.add.zone(45, 27, 70, 34).setInteractive().setDepth(32);
    bkZ.on('pointerdown', () => {
      this.drillActive = false;
      this.ball.hide();
      this._clearTargets();
      if (this.joy) { this.joy.destroy(); this.joy = null; }
      this._buildTrainingMenu(w, h);
    });

    // Place targets
    if (key === 'target') this._placeTargets();

    // Launch first ball
    this._launchDrillBall();
  }

  _placeTargets() {
    this._clearTargets();
    for (let i = 0; i < 3; i++) {
      const tx = Phaser.Math.Between(COURT_LEFT + 30, COURT_RIGHT - 30);
      const ty = Phaser.Math.Between(COURT_TOP + 20, NET_Y - 20);
      const img = this.add.image(tx, ty, 'target').setDepth(7).setAlpha(0.8);
      this.tweens.add({ targets: img, scaleX: 1.2, scaleY: 1.2, duration: 500, yoyo: true, repeat: -1 });
      this.targets.push({ x: tx, y: ty, img });
    }
  }

  _clearTargets() {
    this.targets.forEach(t => { t.img.destroy(); });
    this.targets = [];
  }

  _launchDrillBall() {
    const fromX = Phaser.Math.Between(COURT_LEFT + 30, COURT_RIGHT - 30);
    const fromY = COURT_TOP + 50;
    const speed = this.currentDrill === 'reaction' ? 400 + Math.random() * 150 : 250 + Math.random() * 100;
    this.ball.launch(fromX, fromY, COURT_MID_X, COURT_BOTTOM - 70, speed, 'topspin', 2);
  }

  _performDrillHit() {
    if (!this.drillActive) return;
    const w = this.scale.width;

    let success = false;

    if (this.currentDrill === 'target') {
      // Check if ball is near a target
      const nearTarget = this.targets.find(t => {
        return Math.abs(this.ball.x - t.x) < 50 && Math.abs(this.ball.y - t.y) < 50;
      });
      if (this.player.canReachBall(this.ball) || nearTarget) {
        success = true;
        if (nearTarget) {
          nearTarget.img.destroy();
          this.targets = this.targets.filter(t => t !== nearTarget);
          this._emitHitEffect(nearTarget.x, nearTarget.y);
        }
      }
    } else {
      success = this.player.canReachBall(this.ball) || this.ball.z < 100;
    }

    if (success) {
      this.drillScore++;
      this.hitsRemaining--;
      synth.ballHit(0.8);
      this.cameras.main.shake(50, 0.004);

      if (this.drillScoreText) {
        this.drillScoreText.setText('HITS: ' + this.drillScore + '/' + (this.drillScore + this.hitsRemaining));
      }

      // Counter-hit
      const tx = Phaser.Math.Between(COURT_LEFT + 30, COURT_RIGHT - 30);
      const ty = Phaser.Math.Between(COURT_TOP + 20, NET_Y - 30);
      this.ball.launch(this.player.x, this.player.y, tx, ty, 280, 'topspin', 1);

      if (this.hitsRemaining <= 0) {
        this._endDrill(w, this.scale.height);
        return;
      }

      this.time.delayedCall(1500, () => {
        if (this.drillActive) {
          this._launchDrillBall();
          if (this.currentDrill === 'target' && this.targets.length === 0) {
            this._placeTargets();
          }
        }
      });
    } else {
      // Miss
      this.add.text(w/2, 300, 'MISS!', {
        fontSize: '20px', fontStyle: 'bold', color: '#ff3333',
        stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5).setDepth(20).setAlpha(1);
    }
  }

  _emitHitEffect(x, y) {
    for (let i = 0; i < 10; i++) {
      this.bounceParticles.push({
        x, y,
        vx: (Math.random() - 0.5) * 120,
        vy: -80 - Math.random() * 80,
        life: 0.6, maxLife: 0.6,
        r: 3 + Math.random() * 4,
        color: 0xffd700
      });
    }
  }

  _handleDrillTap(p) {
    // handled by zone
  }

  _endDrill(w, h) {
    this.drillActive = false;
    this.ball.hide();
    this._clearTargets();

    const overlay = this.add.graphics().setDepth(40);
    overlay.fillStyle(0x000000, 0.75);
    overlay.fillRect(0, 0, w, h);

    this.add.text(w/2, h/2 - 100, '🎯 DRILL COMPLETE!', {
      fontSize: '24px', fontStyle: 'bold', color: '#ffd700',
      stroke: '#aa7700', strokeThickness: 3
    }).setOrigin(0.5).setDepth(41);

    const totalPossible = this.drillScore + this.hitsRemaining;
    const pct = Math.round((this.drillScore / Math.max(1, totalPossible)) * 100);
    const grade = pct >= 90 ? 'S+' : pct >= 75 ? 'A' : pct >= 60 ? 'B' : pct >= 40 ? 'C' : 'D';

    this.add.text(w/2, h/2 - 50, 'Score: ' + this.drillScore + '  Grade: ' + grade, {
      fontSize: '22px', fontStyle: 'bold', color: '#ffffff'
    }).setOrigin(0.5).setDepth(41);

    this.add.text(w/2, h/2, 'Accuracy: ' + pct + '%', {
      fontSize: '16px', color: '#aabbcc'
    }).setOrigin(0.5).setDepth(41);

    synth.victory();

    // Retry / menu
    const retryBg = this.add.graphics().setDepth(41);
    retryBg.fillStyle(0x22aa55, 0.9);
    retryBg.fillRoundedRect(w/2 - 110, h/2 + 60, 220, 50, 12);
    this.add.text(w/2, h/2 + 85, '🔄 TRY AGAIN', {
      fontSize: '17px', fontStyle: 'bold', color: '#ffffff'
    }).setOrigin(0.5).setDepth(42);
    const rz = this.add.zone(w/2, h/2 + 85, 220, 50).setInteractive().setDepth(43);
    rz.on('pointerdown', () => {
      if (this.joy) { this.joy.destroy(); this.joy = null; }
      this._startDrill(this.currentDrill, w, h);
    });

    const menuBg = this.add.graphics().setDepth(41);
    menuBg.fillStyle(0x1a3a6b, 0.9);
    menuBg.fillRoundedRect(w/2 - 110, h/2 + 130, 220, 50, 12);
    this.add.text(w/2, h/2 + 155, '🏠 MENU', {
      fontSize: '17px', fontStyle: 'bold', color: '#ffffff'
    }).setOrigin(0.5).setDepth(42);
    const mz = this.add.zone(w/2, h/2 + 155, 220, 50).setInteractive().setDepth(43);
    mz.on('pointerdown', () => {
      if (this.joy) { this.joy.destroy(); this.joy = null; }
      this.scene.start('MenuScene');
    });
  }

  update(time, delta) {
    if (!this.drillActive) return;
    const dt = delta / 1000;
    this.drillTimer += dt;

    if (this.drillTimerText) this.drillTimerText.setText(this.drillTimer.toFixed(1) + 's');

    if (this.joy && this.joy.active) {
      this.player.move(this.joy.dx, this.joy.dy, dt);
    }

    this.player.update(dt);
    this.ball.update(dt);

    // Particle update
    this.emitterGfx.clear();
    this.bounceParticles = this.bounceParticles.filter(p => {
      p.life -= dt;
      if (p.life <= 0) return false;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 100 * dt;
      const a = p.life / p.maxLife;
      this.emitterGfx.fillStyle(p.color, a);
      this.emitterGfx.fillCircle(p.x, p.y, p.r * a);
      return true;
    });

    if (this.ball.inPlay && this.ball.bounces >= 2) {
      this.ball.hide();
      if (this.drillActive) {
        this.time.delayedCall(800, () => {
          if (this.drillActive) this._launchDrillBall();
        });
      }
    }
  }
}
